apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms-backend
  namespace: cms-demo
  labels:
    app: cms-backend
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cms-backend
  template:
    metadata:
      labels:
        app: cms-backend
        component: api
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1654
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: cms-backend
        image: demo-cms-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        - name: ConnectionStrings__DefaultConnection
          value: "Data Source=/app/data/media.db"
        - name: Storage__Path
          value: "/app/uploads"
        - name: MediaEvents__Enabled
          value: "true"
        - name: MediaEvents__BootstrapServers
          value: "kafka:9092"
        - name: MediaEvents__Topic
          value: "media.uploaded"
        - name: OpenTelemetry__EnablePrometheusExporter
          value: "true"
        - name: NODE
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: OpenTelemetry__OtlpEndpoint
          value: "http://$(NODE):4318"
        volumeMounts:
        - name: cms-backend-data
          mountPath: /app/data
        - name: cms-backend-uploads
          mountPath: /app/uploads
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 1654
          runAsGroup: 1654
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: cms-backend-data
        persistentVolumeClaim:
          claimName: backend-data-pvc
      - name: cms-backend-uploads
        persistentVolumeClaim:
          claimName: backend-uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: cms-backend
  namespace: cms-demo
  labels:
    app: cms-backend
    component: api
spec:
  type: ClusterIP
  selector:
    app: cms-backend
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
