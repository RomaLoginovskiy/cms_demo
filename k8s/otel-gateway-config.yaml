apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-gateway-config
  namespace: cms-demo
  labels:
    app: otel-gateway
    component: telemetry
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      kafka:
        brokers:
          - kafka:9092
        topic: otel-logs
        encoding: otlp_json
        group_id: otel-gateway-logs
      otlp:
        protocols:
          grpc: {}
          http: {}

    processors:
      memory_limiter:
        check_interval: 5s
        limit_mib: 400
        spike_limit_mib: 100
      batch: {}

    exporters:
      coralogix:
        domain: eu1.coralogix.com
        private_key: ${env:CORALOGIX_PRIVATE_KEY}
        application_name: otel
        subsystem_name: gateway

    service:
      extensions: [health_check]
      pipelines:
        logs:
          receivers: [kafka]
          processors: [memory_limiter, batch]
          exporters: [coralogix]
