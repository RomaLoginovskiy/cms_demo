apiVersion: v1
kind: Service
metadata:
  name: otel-gateway
  namespace: cms-demo
  labels:
    app: otel-gateway
    component: telemetry
spec:
  type: ClusterIP
  selector:
    app: otel-gateway
  ports:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  - name: otlp-http
    port: 4318
    targetPort: 4318
  - name: health
    port: 13133
    targetPort: 13133
