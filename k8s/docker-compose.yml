version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: DemoCms.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/media.db
      - Storage__Path=/app/uploads
      - OpenTelemetry__OtlpEndpoint=http://localhost:4318
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    networks:
      - cms-network
    depends_on:
      - otel-collector

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:3000
    networks:
      - cms-network
    depends_on:
      - backend

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    environment:
      - OTEL_FEATURE_FLAGS=processor.tailsamplingprocessor.recordpolicy
    volumes:
      - ./otel-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics
      - "8889:8889"   # Prometheus exporter metrics
    networks:
      - cms-network

volumes:
  backend_data:
  backend_uploads:

networks:
  cms-network:
    driver: bridge 