apiVersion: v1
kind: ConfigMap
metadata:
  name: canvas-load-config
  namespace: cms-demo
data:
  load.yaml: |
    run:
      run_id: loadgen-shared
      seed: 42
      duration: null
      ramp_up: 30s
      ramp_down: 10s
      cleanup: true
      paused: true
    target:
      frontend_base_url: http://canvas-frontend
    users:
      count: 150
      max_contexts_per_pod: 150
      think_time_ms: 100
    shard:
      count: 3
    browser:
      headless: true
      viewport_width: 1280
      viewport_height: 720
      action_timeout_ms: 10000
      navigation_timeout_ms: 30000
      slow_mo_ms: 0
    boards:
      mode: shared
      name_prefix: loadgen
      pool_size: 5
    profiles:
      mix:
        lurker: 0.25
        active_drawer: 0.25
        collaborator: 0.30
        admin: 0.10
        media_placer: 0.05
        complex_placer: 0.05
    chaos:
      enabled: false
    abort:
      warmup: 15s
      error_rate_threshold: 0.05
      on_abort: continue
    control:
      listen_port: 8090
      metrics_port: 9091
