apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cms-demo-ingress-boundaries
  namespace: cms-demo
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
