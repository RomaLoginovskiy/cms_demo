apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-gateway
  namespace: cms-demo
  labels:
    app: otel-gateway
    component: telemetry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-gateway
  template:
    metadata:
      labels:
        app: otel-gateway
        component: telemetry
    spec:
      containers:
      - name: otel-gateway
        image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.153.0
        imagePullPolicy: IfNotPresent
        args:
          - "--config=/etc/otelcol/config.yaml"
        ports:
          - name: otlp-grpc
            containerPort: 4317
          - name: otlp-http
            containerPort: 4318
          - name: health
            containerPort: 13133
        env:
          - name: CORALOGIX_PRIVATE_KEY
            valueFrom:
              secretKeyRef:
                name: coralogix-keys
                key: PRIVATE_KEY
        volumeMounts:
          - name: otel-gateway-config
            mountPath: /etc/otelcol
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
        - name: otel-gateway-config
          configMap:
            name: otel-gateway-config
