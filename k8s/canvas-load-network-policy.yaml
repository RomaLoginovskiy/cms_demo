# Opt-in: egress for canvas-load → canvas-frontend and cms-backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: canvas-load-egress
  namespace: cms-demo
spec:
  podSelector:
    matchLabels:
      app: canvas-load
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: canvas-frontend
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - podSelector:
            matchLabels:
              app: cms-backend
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
