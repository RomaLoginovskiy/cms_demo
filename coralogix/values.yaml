opentelemetry-agent:
  hostNetwork: false
  presets:
    profilesCollection:
      enabled: true
    spanMetrics:
      histogramBuckets:
        - 50ms
        - 100ms
        - 200ms
      dbMetrics:
        enabled: true
    logsCollection:
      enabled: true  # Disabled for Docker Desktop compatibility
      reduceLogAttributes:
        enabled: true
      storeCheckpoints: false
    hostMetrics:
      enabled: true  # Disabled for Docker Desktop compatibility (requires hostPath mounts)
      process:
        enabled: true
    hostEntityEvents:
      enabled: true  # Disabled because it requires hostMetrics
    resourceDetection:
      enabled: false  # Disabled for Docker Desktop compatibility (requires hostPath mounts)
    reduceResourceAttributes:
      enabled: true
    kubernetesExtraMetrics:
      enabled: true
      perNode: true
      scrapeAll: false
  command:
    extraArgs: [ "--feature-gates=service.profilesSupport" ]

  config:
    connectors:
      spanmetrics/db2:
        aggregation_cardinality_limit: 100000
        dimensions:
          - name: db.namespace
          - name: db.operation.name
          - name: db.collection.name
          - name: db.system
          - name: service.version
        histogram:
          explicit:
            buckets: [50ms, 100ms, 200ms, 500ms, 1s, 2s, 5s]
        metrics_expiration: 5m
    exporters:
      kafka/logs:
        brokers:
          - kafka:9092
        logs:
          topic: otel-logs
          encoding: otlp_json
    processors:
      # Transform processor to extract severity from log body
      # transform/extract_severity_from_body:
      #   error_mode: ignore
      #   log_statements:
      #     - context: log
      #       statements:
      #         # Extract FATAL from body (case-insensitive) - highest priority
      #         - set(severity_text, "FATAL") where severity_number == SEVERITY_NUMBER_UNSPECIFIED and IsMatch(body.string, "(?i)fatal")
