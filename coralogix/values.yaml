      #         - set(severity_number, SEVERITY_NUMBER_DEBUG) where severity_number == SEVERITY_NUMBER_UNSPECIFIED and IsMatch(body.string, "(?i)debug")
              
      #         # Extract VERBOSE from body (case-insensitive)
      #         - set(severity_text, "VERBOSE") where severity_number == SEVERITY_NUMBER_UNSPECIFIED and IsMatch(body.string, "(?i)verbose")
      #         - set(severity_number, SEVERITY_NUMBER_DEBUG) where severity_number == SEVERITY_NUMBER_UNSPECIFIED and IsMatch(body.string, "(?i)verbose")
              
