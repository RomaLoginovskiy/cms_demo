      #         # Extract WARN from body (case-insensitive)
      #         - set(severity_text, "WARN") where severity_number == SEVERITY_NUMBER_UNSPECIFIED and IsMatch(body.string, "(?i)warn")
      #         - set(severity_number, SEVERITY_NUMBER_WARN) where severity_number == SEVERITY_NUMBER_UNSPECIFIED and IsMatch(body.string, "(?i)warn")
              
      #         # Extract INFO from body (case-insensitive)
      #         - set(severity_text, "INFO") where severity_number == SEVERITY_NUMBER_UNSPECIFIED and IsMatch(body.string, "(?i)info")
      #         - set(severity_number, SEVERITY_NUMBER_INFO) where severity_number == SEVERITY_NUMBER_UNSPECIFIED and IsMatch(body.string, "(?i)info")
              
      #         # Extract DEBUG from body (case-insensitive)
