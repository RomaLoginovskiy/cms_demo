apiVersion: apps/v1
kind: Deployment
metadata:
  name: coralogix-opentelemetry-collector
  namespace: cms-demo
  labels:
    app.kubernetes.io/instance: coralogix-otel-raw
    app.kubernetes.io/name: opentelemetry-cluster-collector
    app.kubernetes.io/part-of: coralogix-infrastructure-explorer
    app.kubernetes.io/version: "0.142.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: coralogix-otel-raw
      app.kubernetes.io/name: opentelemetry-cluster-collector
      component: standalone-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: coralogix-otel-raw
        app.kubernetes.io/name: opentelemetry-cluster-collector
        app.kubernetes.io/part-of: coralogix-infrastructure-explorer
        component: standalone-collector
    spec:
      serviceAccountName: coralogix-opentelemetry-collector
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - operator: Exists
      containers:
        - name: opentelemetry-cluster-collector
          image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.142.0
          imagePullPolicy: IfNotPresent
          command:
            - /otelcol-contrib
            - --config=/conf/relay.yaml
          env:
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: GOMEMLIMIT
              value: 1525MiB
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment.name=cms-demo-cluster
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: CORALOGIX_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: coralogix-keys
                  key: PRIVATE_KEY
          ports:
            - name: otlp
              containerPort: 4317
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 4
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: opentelemetry-cluster-collector-configmap
              mountPath: /conf
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: hostfs
              mountPath: /hostfs
              readOnly: true
              mountPropagation: None
            - name: etcmachineid
              mountPath: /etc/machine-id
              readOnly: true
              mountPropagation: None
            - name: varlibdbusmachineid
              mountPath: /var/lib/dbus/machine-id
              readOnly: true
              mountPropagation: None
      volumes:
        - name: opentelemetry-cluster-collector-configmap
          configMap:
            name: coralogix-opentelemetry-collector
            items:
              - key: relay
                path: relay.yaml
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: hostfs
          hostPath:
            path: /
        - name: etcmachineid
          hostPath:
            path: /etc/machine-id
        - name: varlibdbusmachineid
          hostPath:
            path: /var/lib/dbus/machine-id
