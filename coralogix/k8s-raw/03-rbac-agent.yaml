apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: coralogix-opentelemetry-agent
  labels:
    app.kubernetes.io/instance: coralogix-otel-raw
    app.kubernetes.io/name: opentelemetry-agent
    app.kubernetes.io/part-of: coralogix-infrastructure-explorer
rules:
  - apiGroups: [""]
    resources: [pods, namespaces]
    verbs: [get, watch, list]
  - apiGroups: [apps]
    resources: [replicasets]
    verbs: [get, list, watch]
  - apiGroups: [extensions]
    resources: [replicasets]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [nodes, nodes/stats, nodes/metrics]
    verbs: [get, watch, list]
  - nonResourceURLs: [/metrics]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: coralogix-opentelemetry-agent
  labels:
    app.kubernetes.io/instance: coralogix-otel-raw
    app.kubernetes.io/name: opentelemetry-agent
    app.kubernetes.io/part-of: coralogix-infrastructure-explorer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: coralogix-opentelemetry-agent
subjects:
  - kind: ServiceAccount
    name: coralogix-opentelemetry
    namespace: cms-demo
