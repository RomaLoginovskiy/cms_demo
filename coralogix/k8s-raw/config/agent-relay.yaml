      - delete_key(resource.attributes, "k8s.statefulset.uid")
      - delete_key(resource.attributes, "os.type")
      - delete_key(resource.attributes, "os.version")
      - delete_key(resource.attributes, "process.command")
      - delete_key(resource.attributes, "process.command_line")
      - delete_key(resource.attributes, "process.command_args")
      - delete_key(resource.attributes, "process.executable.name")
      - delete_key(resource.attributes, "process.executable.path")
      - delete_key(resource.attributes, "process.owner")
      - delete_key(resource.attributes, "process.pid")
      - delete_key(resource.attributes, "process.parent_pid")
      - delete_key(resource.attributes, "process.runtime.description")
      - delete_key(resource.attributes, "process.runtime.name")
      - delete_key(resource.attributes, "process.runtime.version")
  transform/reduce_log_attributes:
    error_mode: silent
    log_statements:
    - context: log
      statements:
      - delete_key(attributes, "log.iostream")
      - delete_key(attributes, "log.file.path")
      - delete_key(attributes, "logtag")
      - delete_key(attributes, "time")
  transform/semconv:
    error_mode: ignore
    trace_statements:
    - context: span
      statements:
      - set(attributes["http.method"], attributes["http.request.method"]) where attributes["http.request.method"] != nil
  transform/spanmetrics:
    error_mode: silent
    metric_statements:
    - context: datapoint
      statements:
      - set(attributes["status.code"], "STATUS_CODE_ERROR") where attributes["status.code"] == nil and instrumentation_scope.name
        == "spanmetricsconnector" and attributes["otel.status_code"] == "ERROR"
      - set(attributes["status.code"], "STATUS_CODE_OK") where attributes["status.code"] == nil and instrumentation_scope.name
        == "spanmetricsconnector" and attributes["otel.status_code"] == "OK"
      - set(attributes["status.code"], "STATUS_CODE_UNSET") where attributes["status.code"] == nil and instrumentation_scope.name
        == "spanmetricsconnector" and (attributes["otel.status_code"] == "UNSET" or attributes["otel.status_code"] == nil)
receivers:
  hostmetrics:
    collection_interval: 30s
    root_path: /hostfs
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      disk: null
      filesystem:
        exclude_fs_types:
          fs_types:
          - autofs
          - binfmt_misc
          - bpf
          - cgroup2
          - configfs
          - debugfs
          - devpts
          - devtmpfs
          - fusectl
          - hugetlbfs
          - iso9660
          - mqueue
          - nsfs
          - overlay
          - proc
          - procfs
          - pstore
          - rpc_pipefs
          - securityfs
          - selinuxfs
          - squashfs
          - sysfs
          - tracefs
          match_type: strict
        exclude_mount_points:
          match_type: regexp
          mount_points:
          - /dev/*
          - /proc/*
          - /sys/*
          - /run/k3s/containerd/*
          - /run/containerd/runc/*
          - /var/lib/docker/*
          - /var/lib/kubelet/*
          - /snap/*
      load: null
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      network: null
      process:
        metrics:
          process.cpu.utilization:
            enabled: true
          process.memory.utilization:
            enabled: true
          process.threads:
            enabled: true
        mute_process_exe_error: true
        mute_process_name_error: true
        mute_process_user_error: true
  kubeletstats:
    auth_type: serviceAccount
    collect_all_network_interfaces:
      node: true
      pod: true
    collection_interval: 30s
    endpoint: ${env:K8S_NODE_IP}:10250
    insecure_skip_verify: true
  otlp:
    protocols:
      grpc:
        endpoint: ${env:MY_POD_IP}:4317
        max_recv_msg_size_mib: 20
      http:
        endpoint: ${env:MY_POD_IP}:4318
  prometheus:
    config:
      scrape_configs:
      - job_name: opentelemetry-collector
        scrape_interval: 30s
        static_configs:
        - targets:
          - ${env:MY_POD_IP}:8888
  prometheus/k8s_extra_metrics:
    config:
      scrape_configs:
      - bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        honor_timestamps: true
        job_name: kubernetes-cadvisor
        metrics_path: /metrics/cadvisor
        scheme: https
        static_configs:
        - targets:
          - ${env:K8S_NODE_IP}:10250
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
service:
  extensions:
  - health_check
  - opamp
  - zpages
  - pprof
  pipelines:
    logs/resource_catalog:
      exporters:
      - coralogix/resource_catalog
      processors:
      - memory_limiter
      - resource/metadata
      - k8sattributes
      - resourcedetection/entity
      - transform/entity-event
      receivers:
      - hostmetrics
    metrics:
      exporters:
      - coralogix
      processors:
      - memory_limiter
      - resource/metadata
      - k8sattributes
      - transform/kubeletstatscpu
      - transform/k8s_attributes
      - filter/k8s_extra_metrics
      - transform/spanmetrics
      - transform/reduce
      - transform/prometheus
      - batch
      receivers:
      - hostmetrics
      - kubeletstats
      - prometheus/k8s_extra_metrics
      - prometheus
      - otlp
  telemetry:
    logs:
      encoding: json
      level: info
    metrics:
      readers:
      - pull:
          exporter:
            prometheus:
              host: ${env:MY_POD_IP}
              port: 8888
    resource:
      cx.agent.type: agent
      k8s.daemonset.name: coralogix-opentelemetry
      k8s.namespace.name: cms-demo
      k8s.node.name: ${env:KUBE_NODE_NAME}
      k8s.pod.name: ${env:KUBE_POD_NAME}
      service.name: opentelemetry-collector
