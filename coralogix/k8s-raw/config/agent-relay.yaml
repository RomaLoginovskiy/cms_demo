      - delete_key(resource.attributes, "process.command") where not IsMatch(metric.name, "^process\\.")
      - delete_key(resource.attributes, "process.command_line") where not IsMatch(metric.name, "^process\\.")
      - delete_key(resource.attributes, "process.command_args") where not IsMatch(metric.name, "^process\\.")
      - delete_key(resource.attributes, "process.executable.name") where not IsMatch(metric.name, "^process\\.")
      - delete_key(resource.attributes, "process.executable.path") where not IsMatch(metric.name, "^process\\.")
      - delete_key(resource.attributes, "process.owner") where not IsMatch(metric.name, "^process\\.")
      - delete_key(resource.attributes, "process.pid") where not IsMatch(metric.name, "^process\\.")
      - delete_key(resource.attributes, "process.parent_pid") where not IsMatch(metric.name, "^process\\.")
      - delete_key(resource.attributes, "process.runtime.description") where not IsMatch(metric.name, "^process\\.")
      - delete_key(resource.attributes, "process.runtime.name") where not IsMatch(metric.name, "^process\\.")
      - delete_key(resource.attributes, "process.runtime.version") where not IsMatch(metric.name, "^process\\.")
