exporters:
  coralogix:
    application_name: otel
    application_name_attributes:
    - k8s.namespace.name
    - service.namespace
    domain: eu1.coralogix.com
    logs:
      headers:
        X-Coralogix-Distribution: helm-otel-integration/0.0.267
    metrics:
      headers:
        X-Coralogix-Distribution: helm-otel-integration/0.0.267
    private_key: ${env:CORALOGIX_PRIVATE_KEY}
    profiles:
      headers:
        X-Coralogix-Distribution: helm-otel-integration/0.0.267
    subsystem_name: integration
    subsystem_name_attributes:
    - k8s.deployment.name
    - k8s.statefulset.name
    - k8s.daemonset.name
    - k8s.cronjob.name
    - service.name
    timeout: 30s
    traces:
      headers:
        X-Coralogix-Distribution: helm-otel-integration/0.0.267
  coralogix/resource_catalog:
    application_name: resource
    domain: eu1.coralogix.com
    logs:
      headers:
        X-Coralogix-Distribution: helm-otel-integration/0.0.267
        x-coralogix-ingress: metadata-as-otlp-logs/v1
    private_key: ${CORALOGIX_PRIVATE_KEY}
    subsystem_name: catalog
    timeout: 30s
extensions:
  health_check:
    endpoint: ${env:MY_POD_IP}:13133
  opamp:
    agent_description:
      include_resource_attributes: true
      non_identifying_attributes:
        cx.agent.type: agent
        cx.cluster.name: cms-demo-cluster
        helm.chart.opentelemetry-agent.version: k8s-raw
    server:
      http:
        endpoint: https://ingress.eu1.coralogix.com/opamp/v1
        headers:
          Authorization: Bearer ${env:CORALOGIX_PRIVATE_KEY}
        polling_interval: 2m
  pprof:
    endpoint: localhost:1777
  zpages:
    endpoint: localhost:55679
processors:
  batch:
    send_batch_max_size: 2048
    send_batch_size: 1024
    timeout: 1s
  coralogix:
    transactions:
      enabled: true
  filter/db_compact_spanmetrics:
    traces:
      span:
      - kind != SPAN_KIND_CLIENT or attributes["db.namespace"] == nil or attributes["db.system"] == nil
  filter/db_spanmetrics:
    traces:
      span:
      - attributes["db.system"] == nil
  filter/k8s_extra_metrics:
    metrics:
      metric:
      - resource.attributes["service.name"] == "kubernetes-cadvisor" and (name != "container_fs_writes_total" and name !=
        "container_fs_reads_total" and name != "container_fs_writes_bytes_total" and name != "container_fs_reads_bytes_total"
        and name != "container_fs_usage_bytes" and name != "container_cpu_cfs_throttled_periods_total" and name != "container_cpu_cfs_periods_total")
  groupbytrace/transactions:
    wait_duration: 30s
  k8sattributes:
    extract:
      metadata:
      - k8s.namespace.name
      - k8s.replicaset.name
      - k8s.statefulset.name
      - k8s.daemonset.name
      - k8s.cronjob.name
      - k8s.job.name
      - k8s.node.name
      - k8s.pod.name
    filter:
      node_from_env_var: K8S_NODE_NAME
    passthrough: false
    pod_association:
    - sources:
      - from: resource_attribute
        name: k8s.pod.ip
    - sources:
      - from: resource_attribute
        name: k8s.pod.uid
    - sources:
      - from: connection
    - sources:
      - from: resource_attribute
        name: k8s.job.name
  k8sattributes/profiles:
    extract:
      labels:
      - from: pod
        key: app.kubernetes.io/name
        tag_name: k8s.label.name
      - from: pod
        key: app.kubernetes.io/instance
        tag_name: k8s.label.instance
      metadata:
      - k8s.namespace.name
      - k8s.replicaset.name
      - k8s.statefulset.name
      - k8s.daemonset.name
      - k8s.deployment.name
      - k8s.cronjob.name
      - k8s.job.name
      - k8s.pod.name
      - k8s.node.name
      - container.id
      - k8s.container.name
      - service.version
      otel_annotations: true
    filter:
      node_from_env_var: K8S_NODE_NAME
    passthrough: false
    pod_association:
    - sources:
      - from: resource_attribute
        name: container.id
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25
  redaction/spanname:
    allow_all_keys: true
    db_sanitizer: null
    url_sanitizer:
      enabled: true
  resource/metadata:
    attributes:
    - action: upsert
      key: k8s.cluster.name
      value: cms-demo-cluster
    - action: upsert
      key: cx.otel_integration.name
      value: coralogix-integration-k8s-raw
  resource/remove-fields:
    attributes:
    - action: delete
      key: container.image.name
    - action: delete
      key: container_image_name
  resourcedetection/entity:
    detectors:
    - system
    - env
    override: false
    system:
      resource_attributes:
        host.cpu.cache.l2.size:
          enabled: true
        host.cpu.family:
          enabled: true
        host.cpu.model.id:
          enabled: true
        host.cpu.model.name:
          enabled: true
        host.cpu.stepping:
          enabled: true
        host.cpu.vendor.id:
          enabled: true
        host.id:
          enabled: true
        host.ip:
          enabled: true
        host.mac:
          enabled: true
        os.description:
          enabled: true
    timeout: 2s
  transform/compact:
    trace_statements:
    - context: resource
      statements:
      - keep_keys(attributes, ["service.name", "k8s.cluster.name", "host.name", "deployment.environment.name"])
  transform/db_compact:
    trace_statements:
    - context: resource
      statements:
      - keep_keys(attributes, ["service.name", "k8s.cluster.name", "host.name", "deployment.environment.name"])
    - context: span
      statements:
      - keep_keys(attributes, ["db.namespace", "db.system"])
  transform/entity-event:
    error_mode: silent
    log_statements:
    - context: log
      statements:
      - set(attributes["otel.entity.id"]["host.id"], resource.attributes["host.id"])
      - merge_maps(attributes, resource.attributes, "insert")
    - context: resource
      statements:
      - keep_keys(attributes, [""])
  transform/k8s_attributes:
    log_statements:
    - context: resource
      statements:
      - set(attributes["k8s.deployment.name"], attributes["k8s.replicaset.name"])
      - replace_pattern(attributes["k8s.deployment.name"], "^(.*)-[0-9a-zA-Z]+$", "$$1") where attributes["k8s.replicaset.name"]
        != nil
      - delete_key(attributes, "k8s.replicaset.name")
    metric_statements:
    - context: resource
      statements:
      - set(attributes["k8s.deployment.name"], attributes["k8s.replicaset.name"])
      - replace_pattern(attributes["k8s.deployment.name"], "^(.*)-[0-9a-zA-Z]+$", "$$1") where attributes["k8s.replicaset.name"]
        != nil
      - delete_key(attributes, "k8s.replicaset.name")
    trace_statements:
    - context: resource
      statements:
      - set(attributes["k8s.deployment.name"], attributes["k8s.replicaset.name"])
      - replace_pattern(attributes["k8s.deployment.name"], "^(.*)-[0-9a-zA-Z]+$", "$$1") where attributes["k8s.replicaset.name"]
        != nil
      - delete_key(attributes, "k8s.replicaset.name")
  transform/kubeletstatscpu:
    error_mode: ignore
    metric_statements:
    - context: metric
      statements:
      - set(unit, "1") where name == "container.cpu.usage"
      - set(name, "container.cpu.utilization") where name == "container.cpu.usage"
      - set(unit, "1") where name == "k8s.pod.cpu.usage"
      - set(name, "k8s.pod.cpu.utilization") where name == "k8s.pod.cpu.usage"
      - set(unit, "1") where name == "k8s.node.cpu.usage"
      - set(name, "k8s.node.cpu.utilization") where name == "k8s.node.cpu.usage"
  transform/profiles:
    profile_statements:
    - set(resource.attributes["service.name"], resource.attributes["k8s.label.instance"]) where resource.attributes["service.name"]
      == nil and resource.attributes["k8s.label.instance"] != nil
    - set(resource.attributes["service.name"], resource.attributes["k8s.label.name"]) where resource.attributes["service.name"]
      == nil and resource.attributes["k8s.label.name"] != nil
    - set(resource.attributes["service.name"], resource.attributes["k8s.deployment.name"]) where resource.attributes["service.name"]
      == nil and resource.attributes["k8s.deployment.name"] != nil
    - set(resource.attributes["service.name"], resource.attributes["k8s.replicaset.name"]) where resource.attributes["service.name"]
      == nil and resource.attributes["k8s.replicaset.name"] != nil
    - set(resource.attributes["service.name"], resource.attributes["k8s.statefulset.name"]) where resource.attributes["service.name"]
      == nil and resource.attributes["k8s.statefulset.name"] != nil
    - set(resource.attributes["service.name"], resource.attributes["k8s.daemonset.name"]) where resource.attributes["service.name"]
      == nil and resource.attributes["k8s.daemonset.name"] != nil
    - set(resource.attributes["service.name"], resource.attributes["k8s.cronjob.name"]) where resource.attributes["service.name"]
      == nil and resource.attributes["k8s.cronjob.name"] != nil
    - set(resource.attributes["service.name"], resource.attributes["k8s.job.name"]) where resource.attributes["service.name"]
      == nil and resource.attributes["k8s.job.name"] != nil
    - set(resource.attributes["service.name"], resource.attributes["k8s.pod.name"]) where resource.attributes["service.name"]
      == nil and resource.attributes["k8s.pod.name"] != nil
    - set(resource.attributes["service.name"], resource.attributes["k8s.container.name"]) where resource.attributes["service.name"]
      == nil and resource.attributes["k8s.container.name"] != nil
  transform/prometheus:
    error_mode: ignore
    metric_statements:
    - context: metric
      statements:
      - replace_pattern(metric.name, "_total$", "") where resource.attributes["service.name"] == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_process_cpu_seconds_seconds$", "otelcol_process_cpu_seconds") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_process_memory_rss_bytes$", "otelcol_process_memory_rss_bytes") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_process_runtime_heap_alloc_bytes_bytes$", "otelcol_process_runtime_heap_alloc_bytes")
        where resource.attributes["service.name"] == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_process_runtime_total_alloc_bytes_bytes$", "otelcol_process_runtime_total_alloc_bytes")
        where resource.attributes["service.name"] == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_process_runtime_total_sys_memory_bytes_bytes$", "otelcol_process_runtime_total_sys_memory_bytes")
        where resource.attributes["service.name"] == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_fileconsumer_open_files$", "otelcol_fileconsumer_open_files_ratio") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_fileconsumer_reading_files$", "otelcol_fileconsumer_reading_files_ratio") where
        resource.attributes["service.name"] == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_otelsvc_k8s_ip_lookup_miss$", "otelcol_otelsvc_k8s_ip_lookup_miss_ratio") where
        resource.attributes["service.name"] == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_otelsvc_k8s_pod_added$", "otelcol_otelsvc_k8s_pod_added_ratio") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_otelsvc_k8s_pod_table_size_ratio$", "otelcol_otelsvc_k8s_pod_table_size_ratio")
        where resource.attributes["service.name"] == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_otelsvc_k8s_pod_updated$", "otelcol_otelsvc_k8s_pod_updated_ratio") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_otelsvc_k8s_pod_deleted$", "otelcol_otelsvc_k8s_pod_deleted_ratio") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_processor_filter_spans\\.filtered$", "otelcol_processor_filter_spans.filtered_ratio")
        where resource.attributes["service.name"] == "opentelemetry-collector"
    - context: resource
      statements:
      - set(attributes["k8s.pod.ip"], attributes["net.host.name"]) where attributes["service.name"] == "opentelemetry-collector"
      - delete_key(attributes, "service_name") where attributes["service.name"] == "opentelemetry-collector"
    - context: datapoint
      statements:
      - delete_key(attributes, "service_name") where resource.attributes["service.name"] == "opentelemetry-collector"
      - delete_key(attributes, "otel_scope_name") where attributes["service.name"] == "opentelemetry-collector"
  transform/reduce:
    error_mode: silent
    log_statements:
    - context: log
      statements:
      - delete_key(resource.attributes, "azure.resourcegroup.name")
      - delete_key(resource.attributes, "azure.vm.name")
      - delete_key(resource.attributes, "azure.vm.scaleset.name")
      - delete_key(resource.attributes, "azure.vm.size")
      - delete_key(resource.attributes, "cloud.account.id")
      - delete_key(resource.attributes, "cloud.availability_zone")
      - delete_key(resource.attributes, "cloud.platform")
      - delete_key(resource.attributes, "cloud.provider")
      - delete_key(resource.attributes, "cloud.region")
      - delete_key(resource.attributes, "container.id")
      - delete_key(resource.attributes, "cx.otel_integration.name")
      - delete_key(resource.attributes, "faas.id")
      - delete_key(resource.attributes, "faas.instance")
      - delete_key(resource.attributes, "faas.name")
      - delete_key(resource.attributes, "faas.version")
      - delete_key(resource.attributes, "gcp.cloud_run.job.execution")
      - delete_key(resource.attributes, "gcp.cloud_run.job.task_index")
      - delete_key(resource.attributes, "gcp.gce.instance_group_manager.name")
      - delete_key(resource.attributes, "gcp.gce.instance_group_manager.region")
      - delete_key(resource.attributes, "gcp.gce.instance_group_manager.zone")
      - delete_key(resource.attributes, "host.image.id")
      - delete_key(resource.attributes, "host.type")
      - delete_key(resource.attributes, "k8s.cronjob.uid")
      - delete_key(resource.attributes, "k8s.container.restart_count")
      - delete_key(resource.attributes, "k8s.daemonset.uid")
      - delete_key(resource.attributes, "k8s.deployment.uid")
      - delete_key(resource.attributes, "k8s.hpa.uid")
      - delete_key(resource.attributes, "k8s.job.uid")
      - delete_key(resource.attributes, "k8s.namespace.uid")
      - delete_key(resource.attributes, "k8s.node.uid")
      - delete_key(resource.attributes, "k8s.pod.start_time")
      - delete_key(resource.attributes, "k8s.pod.uid")
      - delete_key(resource.attributes, "k8s.replicaset.uid")
      - delete_key(resource.attributes, "k8s.statefulset.uid")
      - delete_key(resource.attributes, "os.type")
      - delete_key(resource.attributes, "os.version")
      - delete_key(resource.attributes, "process.command")
      - delete_key(resource.attributes, "process.command_line")
      - delete_key(resource.attributes, "process.command_args")
      - delete_key(resource.attributes, "process.executable.name")
      - delete_key(resource.attributes, "process.executable.path")
      - delete_key(resource.attributes, "process.owner")
      - delete_key(resource.attributes, "process.pid")
      - delete_key(resource.attributes, "process.parent_pid")
      - delete_key(resource.attributes, "process.runtime.description")
      - delete_key(resource.attributes, "process.runtime.name")
      - delete_key(resource.attributes, "process.runtime.version")
      - delete_key(resource.attributes, "telemetry.distro.name")
      - delete_key(resource.attributes, "telemetry.distro.version")
      - delete_key(resource.attributes, "telemetry.sdk.language")
      - delete_key(resource.attributes, "telemetry.sdk.name")
      - delete_key(resource.attributes, "telemetry.sdk.version")
    metric_statements:
    - context: metric
      statements:
      - delete_key(resource.attributes, "azure.resourcegroup.name")
      - delete_key(resource.attributes, "azure.vm.name")
      - delete_key(resource.attributes, "azure.vm.scaleset.name")
      - delete_key(resource.attributes, "azure.vm.size")
      - delete_key(resource.attributes, "cloud.account.id")
      - delete_key(resource.attributes, "cloud.availability_zone")
      - delete_key(resource.attributes, "cloud.platform")
      - delete_key(resource.attributes, "cloud.provider")
      - delete_key(resource.attributes, "cloud.region")
      - delete_key(resource.attributes, "container.id")
      - delete_key(resource.attributes, "cx.otel_integration.name")
      - delete_key(resource.attributes, "faas.id")
