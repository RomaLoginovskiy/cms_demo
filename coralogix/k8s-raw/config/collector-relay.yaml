exporters:
  coralogix:
    application_name: otel
    application_name_attributes:
    - k8s.namespace.name
    - service.namespace
    domain: eu1.coralogix.com
    logs:
      headers:
        X-Coralogix-Distribution: helm-otel-integration/0.0.267
    metrics:
      headers:
        X-Coralogix-Distribution: helm-otel-integration/0.0.267
    private_key: ${env:CORALOGIX_PRIVATE_KEY}
    profiles:
      headers:
        X-Coralogix-Distribution: helm-otel-integration/0.0.267
    subsystem_name: integration
    subsystem_name_attributes:
    - k8s.deployment.name
    - k8s.statefulset.name
    - k8s.daemonset.name
    - k8s.cronjob.name
    - service.name
    timeout: 30s
    traces:
      headers:
        X-Coralogix-Distribution: helm-otel-integration/0.0.267
  coralogix/resource_catalog:
    application_name: resource
    domain: eu1.coralogix.com
    logs:
      headers:
        X-Coralogix-Distribution: helm-otel-integration/0.0.267
        x-coralogix-ingress: metadata-as-otlp-logs/v1
    private_key: ${CORALOGIX_PRIVATE_KEY}
    subsystem_name: catalog
    timeout: 30s
extensions:
  health_check:
    endpoint: ${env:MY_POD_IP}:13133
  k8s_observer:
    auth_type: serviceAccount
    observe_pods: true
  opamp:
    agent_description:
      include_resource_attributes: true
      non_identifying_attributes:
        cx.agent.type: cluster-collector
        cx.cluster.name: cms-demo-cluster
        helm.chart.opentelemetry-cluster-collector.version: k8s-raw
    server:
      http:
        endpoint: https://ingress.eu1.coralogix.com/opamp/v1
        headers:
          Authorization: Bearer ${env:CORALOGIX_PRIVATE_KEY}
        polling_interval: 2m
  pprof:
    endpoint: localhost:1777
  zpages:
    endpoint: localhost:55679
processors:
  batch:
    send_batch_max_size: 2048
    send_batch_size: 1024
    timeout: 1s
  coralogix:
    transactions:
      enabled: true
  filter/k8s_apiserver_metrics:
    metrics:
      metric:
      - resource.attributes["service.name"] == "kubernetes-apiserver" and name != "kubernetes_build_info"
  filter/workflow:
    error_mode: silent
    logs:
      log_record:
      - body["object"]["kind"] == "Pod" and not IsMatch(String(body["object"]["metadata"]["ownerReferences"]), ".*StatefulSet.*|.*ReplicaSet.*|.*Job.*|.*DaemonSet.*")
      - body["kind"] == "Pod" and not IsMatch(String(body["metadata"]["ownerReferences"]), ".*StatefulSet.*|.*ReplicaSet.*|.*Job.*|.*DaemonSet.*")
  groupbytrace/transactions:
    wait_duration: 30s
  k8sattributes:
    extract:
      metadata:
      - k8s.namespace.name
      - k8s.replicaset.name
      - k8s.statefulset.name
      - k8s.daemonset.name
      - k8s.cronjob.name
      - k8s.job.name
      - k8s.node.name
      - k8s.pod.name
    passthrough: false
    pod_association:
    - sources:
      - from: resource_attribute
        name: k8s.pod.ip
    - sources:
      - from: resource_attribute
        name: k8s.pod.uid
    - sources:
      - from: connection
    - sources:
      - from: resource_attribute
        name: k8s.job.name
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25
  metricstransform/k8s-dashboard:
    transforms:
    - action: insert
      include: k8s.pod.phase
      match_type: strict
      new_name: kube_pod_status_qos_class
    - action: insert
      include: k8s.pod.status_reason
      match_type: strict
      new_name: kube_pod_status_reason
    - action: insert
      include: k8s.node.allocatable_cpu
      match_type: strict
      new_name: kube_node_info
    - action: insert
      include: k8s.container.ready
      match_type: strict
      new_name: k8s.container.status.last_terminated_reason
  resource/kube-events:
    attributes:
    - action: upsert
      key: service.name
      value: kube-events
    - action: upsert
      key: k8s.cluster.name
      value: cms-demo-cluster
  resource/metadata:
    attributes:
    - action: upsert
      key: k8s.cluster.name
      value: cms-demo-cluster
    - action: upsert
      key: cx.otel_integration.name
      value: coralogix-integration-k8s-raw
  resourcedetection/entity:
    detectors:
    - system
    - env
    override: false
    system:
      resource_attributes:
        host.cpu.cache.l2.size:
          enabled: true
        host.cpu.family:
          enabled: true
        host.cpu.model.id:
          enabled: true
        host.cpu.model.name:
          enabled: true
        host.cpu.stepping:
          enabled: true
        host.cpu.vendor.id:
          enabled: true
        host.id:
          enabled: true
        host.ip:
          enabled: true
        host.mac:
          enabled: true
        os.description:
          enabled: true
    timeout: 2s
  resourcedetection/env:
    detectors:
    - system
    - env
    override: false
    system:
      resource_attributes:
        host.id:
          enabled: true
    timeout: 2s
  resourcedetection/region:
    detectors:
    - gcp
    - ec2
    - azure
    - eks
    eks:
      node_from_env_var: K8S_NODE_NAME
    override: true
    timeout: 2s
  resourcedetection/resource_catalog:
    azure:
      resource_attributes:
        azure.resourcegroup.name:
          enabled: false
        azure.vm.name:
          enabled: false
        azure.vm.scaleset.name:
          enabled: false
        azure.vm.size:
          enabled: false
        host.id:
          enabled: false
        host.name:
          enabled: false
    detectors:
    - eks
    - aks
    - gcp
    - ec2
    - azure
    ec2:
      resource_attributes:
        host.id:
          enabled: false
        host.image.id:
          enabled: false
        host.name:
          enabled: false
        host.type:
          enabled: false
    gcp:
      resource_attributes:
        host.id:
          enabled: false
        host.name:
          enabled: false
        host.type:
          enabled: false
        k8s.cluster.name:
          enabled: false
    override: true
    timeout: 2s
  transform/entity-event:
    error_mode: silent
    log_statements:
    - context: log
      statements:
      - set(attributes["otel.entity.interval"], Milliseconds(Duration("1h")))
  transform/k8s-dashboard:
    error_mode: ignore
    metric_statements:
    - context: metric
      statements:
      - set(unit, "1") where name == "k8s.pod.phase"
      - set(unit, "") where name == "kube_node_info"
      - set(unit, "") where name == "k8s.container.status.last_terminated_reason"
    - context: datapoint
      statements:
      - set(value_int, 1) where metric.name == "kube_pod_status_qos_class"
      - set(attributes["qos_class"], resource.attributes["k8s.pod.qos_class"]) where metric.name == "kube_pod_status_qos_class"
      - set(attributes["pod"], resource.attributes["k8s.pod.name"]) where metric.name == "kube_pod_status_reason"
      - set(attributes["reason"], "Evicted") where metric.name == "kube_pod_status_reason" and value_int == 1
      - set(attributes["reason"], "NodeAffinity") where metric.name == "kube_pod_status_reason" and value_int == 2
      - set(attributes["reason"], "NodeLost") where metric.name == "kube_pod_status_reason" and value_int == 3
      - set(attributes["reason"], "Shutdown") where metric.name == "kube_pod_status_reason" and value_int == 4
      - set(attributes["reason"], "UnexpectedAdmissionError") where metric.name == "kube_pod_status_reason" and value_int
        == 5
      - set(value_int, 0) where metric.name == "kube_pod_status_reason" and value_int == 6
      - set(value_int, 1) where metric.name == "kube_pod_status_reason" and value_int != 0
      - set(value_int, 1) where metric.name == "kube_node_info"
      - set(attributes["kubelet_version"], resource.attributes["k8s.kubelet.version"]) where metric.name == "kube_node_info"
      - set(value_int, 1) where metric.name == "k8s.container.status.last_terminated_reason"
      - set(attributes["reason"], "") where metric.name == "k8s.container.status.last_terminated_reason"
      - set(attributes["reason"], resource.attributes["k8s.container.status.last_terminated_reason"]) where metric.name ==
        "k8s.container.status.last_terminated_reason"
    - context: resource
      statements:
      - delete_key(attributes, "k8s.container.status.last_terminated_reason")
      - delete_key(attributes, "k8s.pod.qos_class")
      - delete_key(attributes, "k8s.kubelet.version")
  transform/k8s_attributes:
    log_statements:
    - context: resource
      statements:
      - set(attributes["k8s.deployment.name"], attributes["k8s.replicaset.name"])
      - replace_pattern(attributes["k8s.deployment.name"], "^(.*)-[0-9a-zA-Z]+$", "$$1") where attributes["k8s.replicaset.name"]
        != nil
      - delete_key(attributes, "k8s.replicaset.name")
    metric_statements:
    - context: resource
      statements:
      - set(attributes["k8s.deployment.name"], attributes["k8s.replicaset.name"])
      - replace_pattern(attributes["k8s.deployment.name"], "^(.*)-[0-9a-zA-Z]+$", "$$1") where attributes["k8s.replicaset.name"]
        != nil
      - delete_key(attributes, "k8s.replicaset.name")
    trace_statements:
    - context: resource
      statements:
      - set(attributes["k8s.deployment.name"], attributes["k8s.replicaset.name"])
      - replace_pattern(attributes["k8s.deployment.name"], "^(.*)-[0-9a-zA-Z]+$", "$$1") where attributes["k8s.replicaset.name"]
        != nil
      - delete_key(attributes, "k8s.replicaset.name")
  transform/kube-events:
    log_statements:
    - context: log
      statements:
      - keep_keys(body["object"], ["type", "eventTime", "reason", "regarding", "note", "metadata", "deprecatedFirstTimestamp",
        "deprecatedLastTimestamp"])
      - keep_keys(body["object"]["metadata"], ["creationTimestamp"])
      - keep_keys(body["object"]["regarding"], ["kind", "name", "namespace"])
  transform/prometheus:
    error_mode: ignore
    metric_statements:
    - context: metric
      statements:
      - replace_pattern(metric.name, "_total$", "") where resource.attributes["service.name"] == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_process_cpu_seconds_seconds$", "otelcol_process_cpu_seconds") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_process_memory_rss_bytes$", "otelcol_process_memory_rss_bytes") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_process_runtime_heap_alloc_bytes_bytes$", "otelcol_process_runtime_heap_alloc_bytes")
        where resource.attributes["service.name"] == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_process_runtime_total_alloc_bytes_bytes$", "otelcol_process_runtime_total_alloc_bytes")
        where resource.attributes["service.name"] == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_process_runtime_total_sys_memory_bytes_bytes$", "otelcol_process_runtime_total_sys_memory_bytes")
        where resource.attributes["service.name"] == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_fileconsumer_open_files$", "otelcol_fileconsumer_open_files_ratio") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_fileconsumer_reading_files$", "otelcol_fileconsumer_reading_files_ratio") where
        resource.attributes["service.name"] == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_otelsvc_k8s_ip_lookup_miss$", "otelcol_otelsvc_k8s_ip_lookup_miss_ratio") where
        resource.attributes["service.name"] == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_otelsvc_k8s_pod_added$", "otelcol_otelsvc_k8s_pod_added_ratio") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_otelsvc_k8s_pod_table_size_ratio$", "otelcol_otelsvc_k8s_pod_table_size_ratio")
        where resource.attributes["service.name"] == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_otelsvc_k8s_pod_updated$", "otelcol_otelsvc_k8s_pod_updated_ratio") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_otelsvc_k8s_pod_deleted$", "otelcol_otelsvc_k8s_pod_deleted_ratio") where resource.attributes["service.name"]
        == "opentelemetry-collector"
      - replace_pattern(metric.name, "^otelcol_processor_filter_spans\\.filtered$", "otelcol_processor_filter_spans.filtered_ratio")
        where resource.attributes["service.name"] == "opentelemetry-collector"
    - context: resource
      statements:
      - set(attributes["k8s.pod.ip"], attributes["net.host.name"]) where attributes["service.name"] == "opentelemetry-collector"
      - delete_key(attributes, "service_name") where attributes["service.name"] == "opentelemetry-collector"
    - context: datapoint
      statements:
      - delete_key(attributes, "service_name") where resource.attributes["service.name"] == "opentelemetry-collector"
      - delete_key(attributes, "otel_scope_name") where attributes["service.name"] == "opentelemetry-collector"
  transform/reduce:
    error_mode: silent
    log_statements:
    - context: log
      statements:
      - delete_key(resource.attributes, "azure.resourcegroup.name")
      - delete_key(resource.attributes, "azure.vm.name")
      - delete_key(resource.attributes, "azure.vm.scaleset.name")
      - delete_key(resource.attributes, "azure.vm.size")
      - delete_key(resource.attributes, "cloud.account.id")
      - delete_key(resource.attributes, "cloud.availability_zone")
      - delete_key(resource.attributes, "cloud.platform")
      - delete_key(resource.attributes, "cloud.provider")
      - delete_key(resource.attributes, "cloud.region")
      - delete_key(resource.attributes, "container.id")
      - delete_key(resource.attributes, "cx.otel_integration.name")
