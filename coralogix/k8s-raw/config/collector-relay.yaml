    error_mode: silent
    log_statements:
    - context: log
      statements:
      - delete_key(body["object"]["metadata"], "managedFields")
      - delete_key(body["metadata"], "managedFields")
service:
  extensions:
  - health_check
  - k8s_observer
  - opamp
  - zpages
  - pprof
  pipelines:
    logs:
      exporters:
      - coralogix
      processors:
      - memory_limiter
      - resource/metadata
      - resource/kube-events
      - resourcedetection/region
      - resourcedetection/env
      - k8sattributes
      - transform/k8s_attributes
      - transform/kube-events
      - transform/reduce
      - batch
      receivers:
      - k8sobjects
      - otlp
    logs/resource_catalog:
      exporters:
      - coralogix/resource_catalog
      processors:
      - memory_limiter
      - resourcedetection/resource_catalog
      - transform/entity-event
      - transform/remove_managed_fields
      - filter/workflow
      - resource/metadata
      - batch
      receivers:
      - k8sobjects/resource_catalog
    metrics:
      exporters:
      - coralogix
      processors:
      - memory_limiter
      - resource/metadata
      - resourcedetection/region
      - resourcedetection/env
      - k8sattributes
      - transform/k8s_attributes
      - metricstransform/k8s-dashboard
      - transform/k8s-dashboard
      - filter/k8s_apiserver_metrics
      - transform/reduce
      - transform/prometheus
      - batch
      receivers:
      - k8s_cluster
      - prometheus
      - prometheus/k8s_apiserver_metrics
      - otlp
      - hostmetrics
  telemetry:
    logs:
      encoding: json
      level: info
    metrics:
      readers:
      - pull:
          exporter:
            prometheus:
              host: ${env:MY_POD_IP}
              port: 8888
    resource:
      cx.agent.type: cluster-collector
      service.name: opentelemetry-collector
receivers:
  hostmetrics:
    collection_interval: 10s
    root_path: /hostfs
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      disk: null
      filesystem:
        exclude_fs_types:
          fs_types:
          - autofs
          - binfmt_misc
          - bpf
          - cgroup2
          - configfs
          - debugfs
          - devpts
          - devtmpfs
          - fusectl
          - hugetlbfs
          - iso9660
          - mqueue
          - nsfs
          - overlay
          - proc
          - procfs
          - pstore
          - rpc_pipefs
          - securityfs
          - selinuxfs
          - squashfs
          - sysfs
          - tracefs
          match_type: strict
        exclude_mount_points:
          match_type: regexp
          mount_points:
          - /dev/*
          - /proc/*
          - /sys/*
          - /run/k3s/containerd/*
          - /run/containerd/runc/*
          - /var/lib/docker/*
          - /var/lib/kubelet/*
          - /snap/*
      load: null
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      network: null
      process:
        metrics:
          process.cpu.utilization:
            enabled: true
          process.memory.utilization:
            enabled: true
          process.threads:
            enabled: true
        mute_process_exe_error: true
        mute_process_name_error: true
        mute_process_user_error: true
  k8s_cluster:
    allocatable_types_to_report:
    - cpu
    - memory
    collection_interval: 30s
    metrics:
      k8s.pod.status_reason:
        enabled: true
    resource_attributes:
      k8s.container.status.last_terminated_reason:
        enabled: true
      k8s.kubelet.version:
        enabled: true
      k8s.pod.qos_class:
        enabled: true
  k8sobjects:
    objects:
    - exclude_watch_type:
      - DELETED
      group: events.k8s.io
      mode: watch
      name: events
  k8sobjects/resource_catalog:
    objects:
    - group: ''
      mode: pull
      name: namespaces
    - group: ''
      mode: pull
      name: nodes
    - group: ''
      mode: pull
      name: persistentvolumeclaims
    - group: ''
      mode: pull
      name: persistentvolumes
    - group: ''
      mode: pull
      name: pods
    - group: ''
      mode: pull
      name: services
    - group: apps
      mode: pull
      name: daemonsets
    - group: apps
      mode: pull
      name: deployments
    - group: apps
      mode: pull
      name: replicasets
    - group: apps
      mode: pull
      name: statefulsets
    - group: autoscaling
      mode: pull
      name: horizontalpodautoscalers
    - group: batch
      mode: pull
      name: cronjobs
    - group: batch
      mode: pull
      name: jobs
    - group: extensions
      mode: pull
      name: ingresses
    - group: networking.k8s.io
      mode: pull
      name: ingresses
    - group: policy
      mode: pull
      name: poddisruptionbudgets
    - group: rbac.authorization.k8s.io
      mode: pull
      name: clusterrolebindings
    - group: rbac.authorization.k8s.io
      mode: pull
      name: clusterroles
    - group: rbac.authorization.k8s.io
      mode: pull
      name: rolebindings
    - group: rbac.authorization.k8s.io
      mode: pull
      name: roles
    - group: ''
      mode: watch
      name: namespaces
    - group: ''
      mode: watch
      name: nodes
    - group: ''
      mode: watch
      name: persistentvolumeclaims
    - group: ''
      mode: watch
      name: persistentvolumes
    - group: ''
      mode: watch
      name: pods
    - group: apps
      mode: watch
      name: daemonsets
    - group: apps
      mode: watch
      name: deployments
    - group: apps
      mode: watch
      name: replicasets
    - group: apps
      mode: watch
      name: statefulsets
    - group: autoscaling
      mode: watch
      name: horizontalpodautoscalers
    - group: batch
      mode: watch
      name: cronjobs
    - group: batch
      mode: watch
      name: jobs
    - group: extensions
      mode: watch
      name: ingresses
    - group: networking.k8s.io
      mode: watch
      name: ingresses
    - group: policy
      mode: watch
      name: poddisruptionbudgets
    - group: rbac.authorization.k8s.io
      mode: watch
      name: clusterrolebindings
    - group: rbac.authorization.k8s.io
      mode: watch
      name: clusterroles
    - group: rbac.authorization.k8s.io
      mode: watch
      name: rolebindings
    - group: rbac.authorization.k8s.io
      mode: watch
      name: roles
  otlp:
    protocols:
      grpc:
        endpoint: ${env:MY_POD_IP}:4317
        max_recv_msg_size_mib: 20
      http:
        endpoint: ${env:MY_POD_IP}:4318
  prometheus:
    config:
      scrape_configs:
      - job_name: opentelemetry-collector
        scrape_interval: 30s
        static_configs:
        - targets:
          - ${env:MY_POD_IP}:8888
  prometheus/k8s_apiserver_metrics:
    config:
      scrape_configs:
      - bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        honor_timestamps: true
        job_name: kubernetes-apiserver
        kubernetes_sd_configs:
        - role: endpoints
        relabel_configs:
        - action: keep
          regex: default;kubernetes;https
          source_labels:
          - __meta_kubernetes_namespace
          - __meta_kubernetes_service_name
          - __meta_kubernetes_endpoint_port_name
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
