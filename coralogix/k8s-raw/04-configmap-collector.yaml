    , \"namespace\"])\n  transform/prometheus:\n    error_mode: ignore\n    metric_statements:\n    - context: metric\n  \
    \    statements:\n      - replace_pattern(metric.name, \"_total$\", \"\") where resource.attributes[\"service.name\"]\
    \ == \"opentelemetry-collector\"\n      - replace_pattern(metric.name, \"^otelcol_process_cpu_seconds_seconds$\", \"otelcol_process_cpu_seconds\"\
    ) where resource.attributes[\"service.name\"]\n        == \"opentelemetry-collector\"\n      - replace_pattern(metric.name,\
    \ \"^otelcol_process_memory_rss_bytes$\", \"otelcol_process_memory_rss_bytes\") where resource.attributes[\"service.name\"\
    ]\n        == \"opentelemetry-collector\"\n      - replace_pattern(metric.name, \"^otelcol_process_runtime_heap_alloc_bytes_bytes$\"\
    , \"otelcol_process_runtime_heap_alloc_bytes\")\n        where resource.attributes[\"service.name\"] == \"opentelemetry-collector\"\
    \n      - replace_pattern(metric.name, \"^otelcol_process_runtime_total_alloc_bytes_bytes$\", \"otelcol_process_runtime_total_alloc_bytes\"\
    )\n        where resource.attributes[\"service.name\"] == \"opentelemetry-collector\"\n      - replace_pattern(metric.name,\
    \ \"^otelcol_process_runtime_total_sys_memory_bytes_bytes$\", \"otelcol_process_runtime_total_sys_memory_bytes\")\n  \
    \      where resource.attributes[\"service.name\"] == \"opentelemetry-collector\"\n      - replace_pattern(metric.name,\
    \ \"^otelcol_fileconsumer_open_files$\", \"otelcol_fileconsumer_open_files_ratio\") where resource.attributes[\"service.name\"\
    ]\n        == \"opentelemetry-collector\"\n      - replace_pattern(metric.name, \"^otelcol_fileconsumer_reading_files$\"\
    , \"otelcol_fileconsumer_reading_files_ratio\") where\n        resource.attributes[\"service.name\"] == \"opentelemetry-collector\"\
    \n      - replace_pattern(metric.name, \"^otelcol_otelsvc_k8s_ip_lookup_miss$\", \"otelcol_otelsvc_k8s_ip_lookup_miss_ratio\"\
