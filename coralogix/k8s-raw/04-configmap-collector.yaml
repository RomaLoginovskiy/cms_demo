apiVersion: v1
kind: ConfigMap
metadata:
  name: coralogix-opentelemetry-collector
  namespace: cms-demo
  labels:
    app.kubernetes.io/instance: coralogix-otel-raw
    app.kubernetes.io/name: opentelemetry-cluster-collector
    app.kubernetes.io/part-of: coralogix-infrastructure-explorer
data:
  relay: "exporters:\n  coralogix:\n    application_name: otel\n    application_name_attributes:\n    - k8s.namespace.name\n\
    \    - service.namespace\n    domain: eu1.coralogix.com\n    logs:\n      headers:\n        X-Coralogix-Distribution:\
    \ helm-otel-integration/0.0.267\n    metrics:\n      headers:\n        X-Coralogix-Distribution: helm-otel-integration/0.0.267\n\
    \    private_key: ${env:CORALOGIX_PRIVATE_KEY}\n    profiles:\n      headers:\n        X-Coralogix-Distribution: helm-otel-integration/0.0.267\n\
    \    subsystem_name: integration\n    subsystem_name_attributes:\n    - k8s.deployment.name\n    - k8s.statefulset.name\n\
    \    - k8s.daemonset.name\n    - k8s.cronjob.name\n    - service.name\n    timeout: 30s\n    traces:\n      headers:\n\
    \        X-Coralogix-Distribution: helm-otel-integration/0.0.267\n  coralogix/resource_catalog:\n    application_name:\
    \ resource\n    domain: eu1.coralogix.com\n    logs:\n      headers:\n        X-Coralogix-Distribution: helm-otel-integration/0.0.267\n\
    \        x-coralogix-ingress: metadata-as-otlp-logs/v1\n    private_key: ${CORALOGIX_PRIVATE_KEY}\n    subsystem_name:\
    \ catalog\n    timeout: 30s\nextensions:\n  health_check:\n    endpoint: ${env:MY_POD_IP}:13133\n  k8s_observer:\n   \
    \ auth_type: serviceAccount\n    observe_pods: true\n  opamp:\n    agent_description:\n      include_resource_attributes:\
    \ true\n      non_identifying_attributes:\n        cx.agent.type: cluster-collector\n        cx.cluster.name: cms-demo-cluster\n\
    \        helm.chart.opentelemetry-cluster-collector.version: k8s-raw\n    server:\n      http:\n        endpoint: https://ingress.eu1.coralogix.com/opamp/v1\n\
    \        headers:\n          Authorization: Bearer ${env:CORALOGIX_PRIVATE_KEY}\n        polling_interval: 2m\n  pprof:\n\
    \    endpoint: localhost:1777\n  zpages:\n    endpoint: localhost:55679\nprocessors:\n  batch:\n    send_batch_max_size:\
    \ 2048\n    send_batch_size: 1024\n    timeout: 1s\n  coralogix:\n    transactions:\n      enabled: true\n  filter/k8s_apiserver_metrics:\n\
    \    metrics:\n      metric:\n      - resource.attributes[\"service.name\"] == \"kubernetes-apiserver\" and name != \"\
    kubernetes_build_info\"\n  filter/workflow:\n    error_mode: silent\n    logs:\n      log_record:\n      - body[\"object\"\
    ][\"kind\"] == \"Pod\" and not IsMatch(String(body[\"object\"][\"metadata\"][\"ownerReferences\"]), \".*StatefulSet.*|.*ReplicaSet.*|.*Job.*|.*DaemonSet.*\"\
    )\n      - body[\"kind\"] == \"Pod\" and not IsMatch(String(body[\"metadata\"][\"ownerReferences\"]), \".*StatefulSet.*|.*ReplicaSet.*|.*Job.*|.*DaemonSet.*\"\
    )\n  groupbytrace/transactions:\n    wait_duration: 30s\n  k8sattributes:\n    extract:\n      metadata:\n      - k8s.namespace.name\n\
    \      - k8s.replicaset.name\n      - k8s.statefulset.name\n      - k8s.daemonset.name\n      - k8s.cronjob.name\n   \
    \   - k8s.job.name\n      - k8s.node.name\n      - k8s.pod.name\n    passthrough: false\n    pod_association:\n    - sources:\n\
    \      - from: resource_attribute\n        name: k8s.pod.ip\n    - sources:\n      - from: resource_attribute\n      \
    \  name: k8s.pod.uid\n    - sources:\n      - from: connection\n    - sources:\n      - from: resource_attribute\n   \
    \     name: k8s.job.name\n  memory_limiter:\n    check_interval: 5s\n    limit_percentage: 80\n    spike_limit_percentage:\
    \ 25\n  metricstransform/k8s-dashboard:\n    transforms:\n    - action: insert\n      include: k8s.pod.phase\n      match_type:\
    \ strict\n      new_name: kube_pod_status_qos_class\n    - action: insert\n      include: k8s.pod.status_reason\n    \
    \  match_type: strict\n      new_name: kube_pod_status_reason\n    - action: insert\n      include: k8s.node.allocatable_cpu\n\
    \      match_type: strict\n      new_name: kube_node_info\n    - action: insert\n      include: k8s.container.ready\n\
    \      match_type: strict\n      new_name: k8s.container.status.last_terminated_reason\n  resource/kube-events:\n    attributes:\n\
    \    - action: upsert\n      key: service.name\n      value: kube-events\n    - action: upsert\n      key: k8s.cluster.name\n\
    \      value: cms-demo-cluster\n  resource/metadata:\n    attributes:\n    - action: upsert\n      key: k8s.cluster.name\n\
    \      value: cms-demo-cluster\n    - action: upsert\n      key: cx.otel_integration.name\n      value: coralogix-integration-k8s-raw\n\
    \  resourcedetection/entity:\n    detectors:\n    - system\n    - env\n    override: false\n    system:\n      resource_attributes:\n\
    \        host.cpu.cache.l2.size:\n          enabled: true\n        host.cpu.family:\n          enabled: true\n       \
    \ host.cpu.model.id:\n          enabled: true\n        host.cpu.model.name:\n          enabled: true\n        host.cpu.stepping:\n\
    \          enabled: true\n        host.cpu.vendor.id:\n          enabled: true\n        host.id:\n          enabled: true\n\
    \        host.ip:\n          enabled: true\n        host.mac:\n          enabled: true\n        os.description:\n    \
    \      enabled: true\n    timeout: 2s\n  resourcedetection/env:\n    detectors:\n    - system\n    - env\n    override:\
    \ false\n    system:\n      resource_attributes:\n        host.id:\n          enabled: true\n    timeout: 2s\n  resourcedetection/region:\n\
    \    detectors:\n    - gcp\n    - ec2\n    - azure\n    - eks\n    eks:\n      node_from_env_var: K8S_NODE_NAME\n    override:\
    \ true\n    timeout: 2s\n  resourcedetection/resource_catalog:\n    azure:\n      resource_attributes:\n        azure.resourcegroup.name:\n\
    \          enabled: false\n        azure.vm.name:\n          enabled: false\n        azure.vm.scaleset.name:\n       \
    \   enabled: false\n        azure.vm.size:\n          enabled: false\n        host.id:\n          enabled: false\n   \
    \     host.name:\n          enabled: false\n    detectors:\n    - eks\n    - aks\n    - gcp\n    - ec2\n    - azure\n\
    \    ec2:\n      resource_attributes:\n        host.id:\n          enabled: false\n        host.image.id:\n          enabled:\
    \ false\n        host.name:\n          enabled: false\n        host.type:\n          enabled: false\n    gcp:\n      resource_attributes:\n\
    \        host.id:\n          enabled: false\n        host.name:\n          enabled: false\n        host.type:\n      \
    \    enabled: false\n        k8s.cluster.name:\n          enabled: false\n    override: true\n    timeout: 2s\n  transform/entity-event:\n\
    \    error_mode: silent\n    log_statements:\n    - context: log\n      statements:\n      - set(attributes[\"otel.entity.interval\"\
    ], Milliseconds(Duration(\"1h\")))\n  transform/k8s-dashboard:\n    error_mode: ignore\n    metric_statements:\n    -\
    \ context: metric\n      statements:\n      - set(unit, \"1\") where name == \"k8s.pod.phase\"\n      - set(unit, \"\"\
    ) where name == \"kube_node_info\"\n      - set(unit, \"\") where name == \"k8s.container.status.last_terminated_reason\"\
    \n    - context: datapoint\n      statements:\n      - set(value_int, 1) where metric.name == \"kube_pod_status_qos_class\"\
    \n      - set(attributes[\"qos_class\"], resource.attributes[\"k8s.pod.qos_class\"]) where metric.name == \"kube_pod_status_qos_class\"\
    \n      - set(attributes[\"pod\"], resource.attributes[\"k8s.pod.name\"]) where metric.name == \"kube_pod_status_reason\"\
    \n      - set(attributes[\"reason\"], \"Evicted\") where metric.name == \"kube_pod_status_reason\" and value_int == 1\n\
    \      - set(attributes[\"reason\"], \"NodeAffinity\") where metric.name == \"kube_pod_status_reason\" and value_int ==\
    \ 2\n      - set(attributes[\"reason\"], \"NodeLost\") where metric.name == \"kube_pod_status_reason\" and value_int ==\
    \ 3\n      - set(attributes[\"reason\"], \"Shutdown\") where metric.name == \"kube_pod_status_reason\" and value_int ==\
    \ 4\n      - set(attributes[\"reason\"], \"UnexpectedAdmissionError\") where metric.name == \"kube_pod_status_reason\"\
    \ and value_int\n        == 5\n      - set(value_int, 0) where metric.name == \"kube_pod_status_reason\" and value_int\
    \ == 6\n      - set(value_int, 1) where metric.name == \"kube_pod_status_reason\" and value_int != 0\n      - set(value_int,\
    \ 1) where metric.name == \"kube_node_info\"\n      - set(attributes[\"kubelet_version\"], resource.attributes[\"k8s.kubelet.version\"\
    ]) where metric.name == \"kube_node_info\"\n      - set(value_int, 1) where metric.name == \"k8s.container.status.last_terminated_reason\"\
    \n      - set(attributes[\"reason\"], \"\") where metric.name == \"k8s.container.status.last_terminated_reason\"\n   \
    \   - set(attributes[\"reason\"], resource.attributes[\"k8s.container.status.last_terminated_reason\"]) where metric.name\
    \ ==\n        \"k8s.container.status.last_terminated_reason\"\n    - context: resource\n      statements:\n      - delete_key(attributes,\
    \ \"k8s.container.status.last_terminated_reason\")\n      - delete_key(attributes, \"k8s.pod.qos_class\")\n      - delete_key(attributes,\
    \ \"k8s.kubelet.version\")\n  transform/k8s_attributes:\n    log_statements:\n    - context: resource\n      statements:\n\
    \      - set(attributes[\"k8s.deployment.name\"], attributes[\"k8s.replicaset.name\"])\n      - replace_pattern(attributes[\"\
    k8s.deployment.name\"], \"^(.*)-[0-9a-zA-Z]+$\", \"$$1\") where attributes[\"k8s.replicaset.name\"]\n        != nil\n\
    \      - delete_key(attributes, \"k8s.replicaset.name\")\n    metric_statements:\n    - context: resource\n      statements:\n\
    \      - set(attributes[\"k8s.deployment.name\"], attributes[\"k8s.replicaset.name\"])\n      - replace_pattern(attributes[\"\
    k8s.deployment.name\"], \"^(.*)-[0-9a-zA-Z]+$\", \"$$1\") where attributes[\"k8s.replicaset.name\"]\n        != nil\n\
    \      - delete_key(attributes, \"k8s.replicaset.name\")\n    trace_statements:\n    - context: resource\n      statements:\n\
    \      - set(attributes[\"k8s.deployment.name\"], attributes[\"k8s.replicaset.name\"])\n      - replace_pattern(attributes[\"\
