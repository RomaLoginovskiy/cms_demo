    \n      - replace_pattern(metric.name, \"^otelcol_otelsvc_k8s_pod_updated$\", \"otelcol_otelsvc_k8s_pod_updated_ratio\"\
    ) where resource.attributes[\"service.name\"]\n        == \"opentelemetry-collector\"\n      - replace_pattern(metric.name,\
    \ \"^otelcol_otelsvc_k8s_pod_deleted$\", \"otelcol_otelsvc_k8s_pod_deleted_ratio\") where resource.attributes[\"service.name\"\
    ]\n        == \"opentelemetry-collector\"\n      - replace_pattern(metric.name, \"^otelcol_processor_filter_spans\\\\\
