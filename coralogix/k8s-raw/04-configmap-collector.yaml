    \ \"^otelcol_otelsvc_k8s_pod_added$\", \"otelcol_otelsvc_k8s_pod_added_ratio\") where resource.attributes[\"service.name\"\
    ]\n        == \"opentelemetry-collector\"\n      - replace_pattern(metric.name, \"^otelcol_otelsvc_k8s_pod_table_size_ratio$\"\
