    \ https://ingress.eu1.coralogix.com/opamp/v1\n        headers:\n          Authorization: Bearer ${env:CORALOGIX_PRIVATE_KEY}\n\
    \        polling_interval: 2m\n  pprof:\n    endpoint: localhost:1777\n  zpages:\n    endpoint: localhost:55679\nprocessors:\n\
    \  batch:\n    send_batch_max_size: 2048\n    send_batch_size: 1024\n    timeout: 1s\n  coralogix:\n    transactions:\n\
    \      enabled: true\n  filter/db_compact_spanmetrics:\n    traces:\n      span:\n      - kind != SPAN_KIND_CLIENT or\
    \ attributes[\"db.namespace\"] == nil or attributes[\"db.system\"] == nil\n  filter/db_spanmetrics:\n    traces:\n   \
    \   span:\n      - attributes[\"db.system\"] == nil\n  filter/k8s_extra_metrics:\n    metrics:\n      metric:\n      -\
    \ resource.attributes[\"service.name\"] == \"kubernetes-cadvisor\" and (name != \"container_fs_writes_total\" and name\
