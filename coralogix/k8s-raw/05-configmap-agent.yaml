    \ name: k8s.pod.uid\n    - sources:\n      - from: connection\n    - sources:\n      - from: resource_attribute\n    \
    \    name: k8s.job.name\n  k8sattributes/profiles:\n    extract:\n      labels:\n      - from: pod\n        key: app.kubernetes.io/name\n\
    \        tag_name: k8s.label.name\n      - from: pod\n        key: app.kubernetes.io/instance\n        tag_name: k8s.label.instance\n\
    \      metadata:\n      - k8s.namespace.name\n      - k8s.replicaset.name\n      - k8s.statefulset.name\n      - k8s.daemonset.name\n\
    \      - k8s.deployment.name\n      - k8s.cronjob.name\n      - k8s.job.name\n      - k8s.pod.name\n      - k8s.node.name\n\
    \      - container.id\n      - k8s.container.name\n      - service.version\n      otel_annotations: true\n    filter:\n\
