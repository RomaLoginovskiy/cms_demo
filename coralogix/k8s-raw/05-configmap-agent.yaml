    \n        and name != \"container_fs_usage_bytes\" and name != \"container_cpu_cfs_throttled_periods_total\" and name\
    \ != \"container_cpu_cfs_periods_total\")\n  groupbytrace/transactions:\n    wait_duration: 30s\n  k8sattributes:\n  \
    \  extract:\n      metadata:\n      - k8s.namespace.name\n      - k8s.replicaset.name\n      - k8s.statefulset.name\n\
