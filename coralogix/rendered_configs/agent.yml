receivers:
  filelog:
    exclude: []
    force_flush_period: 0
    include:
    - /var/log/pods/*/*/*.log
    include_file_name: false
    include_file_path: true
    operators:
    - id: get-format
      routes:
      - expr: body matches "^\\{"
        output: parser-docker
      - expr: body matches "^[^ Z]+ "
        output: parser-crio
      - expr: body matches "^[^ Z]+Z"
        output: parser-containerd
      type: router
    - id: parser-crio
      regex: ^(?P<time>[^ Z]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$
      timestamp:
        layout: 2006-01-02T15:04:05.999999999Z07:00
        layout_type: gotime
        parse_from: attributes.time
      type: regex_parser
    - combine_field: attributes.log
      combine_with: ""
      id: crio-recombine
      is_last_entry: attributes.logtag == 'F'
      max_batch_size: 1000
      max_log_size: 1048576
      output: handle_empty_log
      source_identifier: attributes["log.file.path"]
      type: recombine
    - id: parser-containerd
      regex: ^(?P<time>[^ ^Z]+Z) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$
      timestamp:
        layout: '%Y-%m-%dT%H:%M:%S.%LZ'
        parse_from: attributes.time
      type: regex_parser
    - combine_field: attributes.log
      combine_with: ""
      id: containerd-recombine
      is_last_entry: attributes.logtag == 'F'
      max_batch_size: 1000
      max_log_size: 1048576
      output: handle_empty_log
      source_identifier: attributes["log.file.path"]
      type: recombine
    - id: parser-docker
      timestamp:
        layout: '%Y-%m-%dT%H:%M:%S.%LZ'
        parse_from: attributes.time
      type: json_parser
    - combine_field: attributes.log
      combine_with: ""
      id: docker-recombine
      is_last_entry: attributes.log endsWith "\n"
      max_batch_size: 1000
      max_log_size: 1048576
      output: handle_empty_log
      source_identifier: attributes["log.file.path"]
      type: recombine
    - field: attributes.log
      id: handle_empty_log
      if: attributes.log == nil
      type: add
      value: ""
    - parse_from: attributes["log.file.path"]
      regex: ^.*\/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+)_(?P<uid>[a-f0-9\-]+)\/(?P<container_name>[^\._]+)\/(?P<restart_count>\d+)\.log$
      type: regex_parser
    - from: attributes.stream
      to: attributes["log.iostream"]
      type: move
    - from: attributes.container_name
      to: resource["k8s.container.name"]
      type: move
    - from: attributes.namespace
      to: resource["k8s.namespace.name"]
      type: move
    - from: attributes.pod_name
      to: resource["k8s.pod.name"]
      type: move
    - from: attributes.restart_count
      to: resource["k8s.container.restart_count"]
      type: move
    - from: attributes.uid
      to: resource["k8s.pod.uid"]
      type: move
    - from: attributes.log
      id: clean-up-log-record
      to: body
      type: move
    - drop_ratio: 1
      expr: (attributes["log.file.path"] matches "/var/log/pods/cms-demo_coralogix-opentelemetry.*_.*/opentelemetry-agent/.*.log")
        and ((body contains "logRecord") or (body contains "ResourceLog"))
      type: filter
    - default: export
      routes:
      - expr: (body matches "\"resource\":{.*?},?")
        output: parse-body
      type: router
    - id: parse-body
      if: (attributes["log.file.path"] matches "/var/log/pods/cms-demo_coralogix-opentelemetry.*_.*/.*/.*.log")
      on_error: send_quiet
      parse_to: attributes["parsed_body_tmp"]
      type: json_parser
    - field: body
      if: (attributes["log.file.path"] matches "/var/log/pods/cms-demo_coralogix-opentelemetry.*_.*/.*/.*.log")
      on_error: send_quiet
      regex: \"resource\":{.*?},?
      replace_with: ""
      type: regex_replace
    - from: attributes["parsed_body_tmp"]["resource"]
      if: (attributes["log.file.path"] matches "/var/log/pods/cms-demo_coralogix-opentelemetry.*_.*/.*/.*.log")
      on_error: send_quiet
      to: resource["attributes_tmp"]
      type: move
    - field: attributes["parsed_body_tmp"]
      if: (attributes["log.file.path"] matches "/var/log/pods/cms-demo_coralogix-opentelemetry.*_.*/.*/.*.log")
      on_error: send_quiet
      type: remove
    - field: resource["attributes_tmp"]
      id: flatten-resource
      if: (attributes["log.file.path"] matches "/var/log/pods/cms-demo_coralogix-opentelemetry.*_.*/.*/.*.log")
      on_error: send_quiet
      type: flatten
    - id: export
      type: noop
    retry_on_failure:
      enabled: true
    start_at: beginning
  jaeger:
    protocols:
      grpc:
        endpoint: ${env:MY_POD_IP}:14250
      thrift_binary:
        endpoint: ${env:MY_POD_IP}:6832
      thrift_compact:
        endpoint: ${env:MY_POD_IP}:6831
      thrift_http:
        endpoint: ${env:MY_POD_IP}:14268
  kubeletstats:
    auth_type: serviceAccount
    collect_all_network_interfaces:
      node: true
      pod: true
    collection_interval: '30s'
    endpoint: ${env:K8S_NODE_IP}:10250
    insecure_skip_verify: true
  otlp:
    protocols:
      grpc:
        endpoint: ${env:MY_POD_IP}:4317
        max_recv_msg_size_mib: 20
      http:
        endpoint: ${env:MY_POD_IP}:4318
  prometheus:
    config:
      scrape_configs:
      - job_name: opentelemetry-collector
        scrape_interval: '30s'
        static_configs:
        - targets:
          - ${env:MY_POD_IP}:8888
  statsd:
    endpoint: ${env:MY_POD_IP}:8125
  zipkin:
    endpoint: ${env:MY_POD_IP}:9411
service:
  extensions:
  - health_check
  - opamp
  - zpages
  - pprof
  pipelines:
    logs:
      exporters:
      - coralogix
      processors:
      - memory_limiter
      - resource/metadata
      - k8sattributes
      - transform/reduce_log_attributes
      - transform/k8s_attributes
      - transform/reduce
      - batch
      receivers:
      - filelog
      - otlp
    metrics:
      exporters:
      - coralogix
      processors:
      - resource/metadata
      - k8sattributes
      - resource/remove-fields
      - transform/reduce_2
      - transform/kubeletstatscpu
      - transform/k8s_attributes
      - transform/reduce
      - transform/prometheus
      - batch
      receivers:
      - kubeletstats
      - spanmetrics
      - spanmetrics/db
      - prometheus
      - otlp
      - statsd
    traces:
      exporters:
      - spanmetrics
      - forward/db
      - coralogix
      processors:
      - memory_limiter
      - resource/metadata
      - k8sattributes
      - transform/k8s_attributes
      - transform/reduce
      - transform/semconv
      - batch
      receivers:
      - jaeger
      - zipkin
      - otlp
    traces/db:
      exporters:
      - spanmetrics/db
      processors:
      - filter/db_spanmetrics
      - batch
      receivers:
      - forward/db
  telemetry:
    logs:
      encoding: json
      level: 'info'
    metrics:
      readers:
      - pull:
          exporter:
            prometheus:
              host: ${env:MY_POD_IP}
              port: 8888
    resource:
      cx.agent.type: agent
      service.name: opentelemetry-collector
